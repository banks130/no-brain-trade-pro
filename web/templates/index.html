<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No-Brain-Trade Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, monospace;
            background: #0a0a0a;
            color: #00ff00;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 20px;
            border-bottom: 2px solid #00ff00;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 1.5rem;
        }
        
        .header p {
            color: #888;
            font-size: 0.75rem;
            margin-top: 10px;
        }
        
        .token-list {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .token {
            background: #111;
            padding: 15px;
            margin: 10px 0;
            border-left: 3px solid #00ff00;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        .token.spike {
            border-left-color: #ff0000;
            background: #1a0000;
            animation: pulse 0.5s;
        }
        
        @keyframes pulse {
            0% { background: #1a0000; }
            50% { background: #330000; }
            100% { background: #1a0000; }
        }
        
        .token-symbol {
            font-size: 18px;
            font-weight: bold;
            display: inline-block;
        }
        
        .token-price {
            float: right;
            font-size: 14px;
            color: #888;
        }
        
        .token-spike {
            color: #ff0000;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .token-mint {
            font-size: 10px;
            color: #666;
            margin-top: 5px;
            font-family: monospace;
        }
        
        .token-time {
            font-size: 10px;
            color: #444;
            margin-top: 5px;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 10px;
            margin-top: 20px;
        }
        
        .status {
            text-align: center;
            padding: 10px;
            color: #00ff00;
            font-size: 12px;
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: #000;
            border-radius: 5px;
            padding: 5px 10px;
        }
        
        .status.offline {
            color: #ff0000;
        }
        
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            .token {
                padding: 10px;
            }
            .token-symbol {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ NO-BRAIN-TRADE PRO ⚡</h1>
        <p>Real-time pump.fun spike detection | 150%+ alerts | AI Analysis</p>
    </div>
    
    <div class="token-list" id="tokens">
        <div class="token" style="text-align: center; color: #666;">
            Waiting for spikes...
        </div>
    </div>
    
    <div class="footer">
        <p>Free alerts | Pro AI analysis | Non-custodial auto-trading</p>
        <p style="margin-top: 10px;">🔒 Your keys, your crypto</p>
    </div>
    
    <div class="status" id="status">
        🔄 Connecting...
    </div>
    
    <script>
        let reconnectAttempts = 0;
        let eventSource = null;
        
        function connectSSE() {
            if (eventSource) {
                eventSource.close();
            }
            
            eventSource = new EventSource('/events');
            
            eventSource.onopen = function() {
                document.getElementById('status').innerHTML = '✅ Live';
                document.getElementById('status').style.color = '#00ff00';
                reconnectAttempts = 0;
            };
            
            eventSource.onerror = function() {
                document.getElementById('status').innerHTML = '⚠️ Reconnecting...';
                document.getElementById('status').style.color = '#ffaa00';
                reconnectAttempts++;
                
                if (reconnectAttempts > 5) {
                    setTimeout(connectSSE, 5000);
                }
            };
            
            eventSource.addEventListener('spike', function(event) {
                const data = JSON.parse(event.data);
                addToken(data, true);
            });
            
            eventSource.addEventListener('token', function(event) {
                const data = JSON.parse(event.data);
                addToken(data, false);
            });
            
            eventSource.addEventListener('ping', function() {
                // Keep connection alive
            });
        }
        
        function addToken(token, isSpike) {
            const tokensDiv = document.getElementById('tokens');
            const tokenDiv = document.createElement('div');
            tokenDiv.className = isSpike ? 'token spike' : 'token';
            
            const spikeBadge = isSpike ? `<span class="token-spike">🚀 +${token.spike_pct ? token.spike_pct.toFixed(0) : '0'}%</span>` : '';
            const price = token.price_sol ? token.price_sol.toFixed(8) : '0';
            const mintShort = token.mint ? `${token.mint.slice(0, 8)}...${token.mint.slice(-8)}` : 'Unknown';
            const time = new Date().toLocaleTimeString();
            
            tokenDiv.innerHTML = `
                <div>
                    <span class="token-symbol">${token.symbol || '???'}</span>
                    ${spikeBadge}
                    <span class="token-price">💰 ${price} SOL</span>
                </div>
                <div class="token-mint">📝 ${mintShort}</div>
                <div class="token-time">🕐 ${time}</div>
            `;
            
            tokensDiv.prepend(tokenDiv);
            
            // Keep only last 50 tokens
            while (tokensDiv.children.length > 50) {
                tokensDiv.removeChild(tokensDiv.lastChild);
            }
            
            // Play sound on spike (optional)
            if (isSpike) {
                try {
                    const audio = new Audio('data:audio/wav;base64,U3RlYWx0aCBzb3VuZCBub3QgYXZhaWxhYmxl');
                    audio.play().catch(() => {});
                } catch(e) {}
            }
        }
        
        // Start connection
        connectSSE();
        
        // Health check
        setInterval(async () => {
            try {
                const response = await fetch('/health');
                if (!response.ok) {
                    document.getElementById('status').innerHTML = '⚠️ Server error';
                    document.getElementById('status').style.color = '#ff0000';
                }
            } catch(e) {
                document.getElementById('status').innerHTML = '🔌 Disconnected';
                document.getElementById('status').style.color = '#ff0000';
            }
        }, 30000);
    </script>
</body>
</html>
