<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No-Brain-Trade Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff00;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 20px;
            border-bottom: 2px solid #00ff00;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 24px;
        }
        
        .header p {
            color: #888;
            font-size: 12px;
        }
        
        .token-list {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .token {
            background: #111;
            padding: 15px;
            margin: 10px 0;
            border-left: 3px solid #00ff00;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        .token.spike {
            border-left-color: #ff0000;
            background: #1a0000;
            animation: pulse 1s;
        }
        
        @keyframes pulse {
            0% { background: #1a0000; }
            50% { background: #330000; }
            100% { background: #1a0000; }
        }
        
        .token-symbol {
            font-size: 18px;
            font-weight: bold;
            display: inline-block;
        }
        
        .token-price {
            float: right;
            font-size: 14px;
            color: #888;
        }
        
        .token-spike {
            color: #ff0000;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .token-mint {
            font-size: 10px;
            color: #666;
            margin-top: 5px;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 10px;
            margin-top: 20px;
        }
        
        .status {
            text-align: center;
            padding: 10px;
            color: #00ff00;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ NO-BRAIN-TRADE PRO ⚡</h1>
        <p>Real-time pump.fun spike detection | 150%+ alerts</p>
    </div>
    
    <div class="status" id="status">
        Connecting...
    </div>
    
    <div class="token-list" id="tokens">
        <div class="token">Waiting for spikes...</div>
    </div>
    
    <div class="footer">
        Free alerts | Pro AI analysis | Non-custodial auto-trading
    </div>
    
    <script>
        const eventSource = new EventSource('/events');
        const tokensDiv = document.getElementById('tokens');
        const statusDiv = document.getElementById('status');
        
        eventSource.onopen = function() {
            statusDiv.innerHTML = '✅ Connected - watching for spikes';
            statusDiv.style.color = '#00ff00';
        };
        
        eventSource.onerror = function() {
            statusDiv.innerHTML = '❌ Disconnected - reconnecting...';
            statusDiv.style.color = '#ff0000';
        };
        
        eventSource.addEventListener('spike', function(event) {
            const data = JSON.parse(event.data);
            addToken(data, true);
        });
        
        eventSource.addEventListener('token', function(event) {
            const data = JSON.parse(event.data);
            addToken(data, false);
        });
        
        eventSource.addEventListener('ping', function() {
            // Keep connection alive
        });
        
        function addToken(token, isSpike) {
            const tokenDiv = document.createElement('div');
            tokenDiv.className = isSpike ? 'token spike' : 'token';
            
            const spikeBadge = isSpike ? `<span class="token-spike">🚀 +${token.spike_pct.toFixed(0)}%</span>` : '';
            
            tokenDiv.innerHTML = `
                <div>
                    <span class="token-symbol">${token.symbol}</span>
                    ${spikeBadge}
                    <span class="token-price">💰 ${token.price_sol.toFixed(8)} SOL</span>
                </div>
                <div class="token-mint">${token.mint.slice(0, 8)}...${token.mint.slice(-8)}</div>
            `;
            
            tokensDiv.prepend(tokenDiv);
            
            // Keep only last 50 tokens
            while (tokensDiv.children.length > 50) {
                tokensDiv.removeChild(tokensDiv.lastChild);
            }
        }
    </script>
</body>
</html>
